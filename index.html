<script>
const url = "https://script.google.com/macros/s/AKfycby62APQM6iXtLD0zskznLl5CJtYbClqVHALUxiAmqMuoWMPE6pIU1oJd1rwnHue7uia/exec";

let convidados = [];
let confirmados = [];
let convidadoAtual = null;

function normalizarTexto(texto) {
  return texto.toLowerCase().trim();
}

async function carregarDados() {
  const res = await fetch(url);
  const data = await res.json();

  convidados = data.convidados;
  confirmados = data.confirmados;

  console.log("Convidados:", convidados);
  console.log("Confirmados:", confirmados);
}

function buscarConvidado() {
  const busca = normalizarTexto(document.getElementById("buscaNome").value);

  const encontrado = convidados.find(c =>
    normalizarTexto(c.nome).includes(busca)
  );

  if (!encontrado) {
    document.getElementById("resultadoBusca").innerHTML = "Nenhum convite encontrado.";
    return;
  }

  // 🔒 BLOQUEIO DE DUPLICIDADE
  const jaConfirmou = confirmados.some(nome =>
    normalizarTexto(nome) === normalizarTexto(encontrado.nome)
  );

  if (jaConfirmou) {
    document.getElementById("resultadoBusca").innerHTML = `
      <div class="gift">
        <p><strong>${encontrado.nome}</strong></p>
        <p style="color:red;">Você já confirmou presença.</p>
      </div>
    `;
    return;
  }

  convidadoAtual = encontrado;

  let html = `
    <div class="gift">
      <p><strong>${encontrado.nome}</strong></p>

      <label>Grupo de idade:</label>
      <select id="idade1">
        <option>Adulto</option>
        <option>Criança</option>
      </select>

      <label>Status:</label>
      <select id="presenca1">
        <option>Comparecerá</option>
        <option>Não comparecerá</option>
      </select>
  `;

  if (encontrado.acompanhantes > 0) {
    html += `
      <h3>Acompanhante</h3>

      <select id="idade2">
        <option>Adulto</option>
        <option>Criança</option>
      </select>

      <select id="presenca2">
        <option>Comparecerá</option>
        <option>Não comparecerá</option>
      </select>

      <p style="color:red;">Limite de convidados atingido.</p>
    `;
  }

  html += `<button class="button" onclick="enviarConfirmacao()">Enviar</button></div>`;

  document.getElementById("resultadoBusca").innerHTML = html;
}

function enviarConfirmacao() {
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      nomePrincipal: convidadoAtual.nome,
      acompanhante: "",
      idade1: document.getElementById("idade1").value,
      presenca1: document.getElementById("presenca1").value,
      idade2: document.getElementById("idade2")?.value || "",
      presenca2: document.getElementById("presenca2")?.value || ""
    })
  }).then(() => {
    document.getElementById("resultadoBusca").innerHTML =
      "<p>Confirmação enviada!</p>";
  });
}

carregarDados();
</script>
