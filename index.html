<script>
  const url = "https://script.google.com/macros/s/AKfycby62APQM6iXtLD0zskznLl5CJtYbClqVHALUxiAmqMuoWMPE6pIU1oJd1rwnHue7uia/exec";

  let convidados = [];
  let confirmados = [];
  let convidadoAtual = null;

  function normalizarTexto(texto) {
    return (texto || "")
      .toString()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim()
      .toLowerCase();
  }

  async function carregarDados() {
    document.getElementById("resultadoBusca").innerHTML =
      "<p class='status-message'>Carregando lista de convidados...</p>";

    try {
      const resposta = await fetch(url);
      const dados = await resposta.json();

      convidados = dados.convidados || [];
      confirmados = dados.confirmados || [];

      document.getElementById("resultadoBusca").innerHTML = "";
    } catch (erro) {
      document.getElementById("resultadoBusca").innerHTML =
        "<p class='status-message error-message'>Erro ao carregar lista. Tente atualizar a página.</p>";
    }
  }

  function mostrarSugestoes() {
    const busca = normalizarTexto(document.getElementById("buscaNome").value);

    if (!busca) {
      document.getElementById("resultadoBusca").innerHTML = "";
      return;
    }

    const resultados = convidados.filter(c =>
      normalizarTexto(c.nome).includes(busca)
    );

    let html = `<div class="suggestions-card">`;

    resultados.slice(0, 5).forEach(c => {
      html += `
        <div class="suggestion-item" onclick="selecionarConvidado('${c.nome}')">
          ${c.nome}
        </div>
      `;
    });

    html += `</div>`;

    document.getElementById("resultadoBusca").innerHTML = html;
  }

  function selecionarConvidado(nome) {
    document.getElementById("buscaNome").value = nome;
    buscarConvidado();
  }

  function buscarConvidado() {
    const busca = normalizarTexto(document.getElementById("buscaNome").value);

    const encontrado = convidados.find(c =>
      normalizarTexto(c.nome).includes(busca)
    );

    if (!encontrado) {
      document.getElementById("resultadoBusca").innerHTML =
        "<p class='status-message'>Nenhum convite encontrado.</p>";
      return;
    }

    const jaConfirmou = confirmados.includes(encontrado.nome);

    if (jaConfirmou) {
      document.getElementById("resultadoBusca").innerHTML = `
        <div class="card centered">
          <p class="card-heading">${encontrado.nome}</p>
          <p class="success-message">Sua presença já foi confirmada 💛</p>
        </div>
      `;
      return;
    }

    convidadoAtual = encontrado;

    let html = `
      <div class="card" id="formRSVP">
        <p class="card-heading">Confirme sua presença</p>

        <label>Nome principal:</label>
        <input type="text" value="${encontrado.nome}" disabled>

        <label>Grupo de idade:</label>
        <select id="idadePrincipal">
          <option value="Adulto">Adulto</option>
          <option value="Criança">Criança</option>
        </select>

        <label>Status:</label>
        <select id="presencaPrincipal">
          <option value="">Selecione</option>
          <option value="Comparecerá">Irá comparecer</option>
          <option value="Não comparecerá">Não irá comparecer</option>
        </select>
    `;

    encontrado.acompanhantes.forEach((nome, i) => {
      html += `
        <hr>
        <label>${nome}:</label>
        <input type="text" value="${nome}" disabled>

        <select id="idade${i}">
          <option value="Adulto">Adulto</option>
          <option value="Criança">Criança</option>
        </select>

        <select id="presenca${i}">
          <option value="">Selecione</option>
          <option value="Comparecerá">Irá comparecer</option>
          <option value="Não comparecerá">Não irá comparecer</option>
        </select>
      `;
    });

    html += `
        <button class="button" onclick="enviarConfirmacao()">Confirmar presença</button>
      </div>
    `;

    document.getElementById("resultadoBusca").innerHTML = html;

    // 🔥 SCROLL AUTOMÁTICO
    document.getElementById("formRSVP").scrollIntoView({
      behavior: "smooth",
      block: "start"
    });
  }

  async function enviarConfirmacao() {
    const payload = {
      nomeConvite: convidadoAtual.nome,
      nomePrincipal: convidadoAtual.nome,
      idadePrincipal: document.getElementById("idadePrincipal").value,
      presencaPrincipal: document.getElementById("presencaPrincipal").value,
      acompanhantes: convidadoAtual.acompanhantes.map((nome, i) => ({
        nome,
        idade: document.getElementById(`idade${i}`).value,
        presenca: document.getElementById(`presenca${i}`).value
      }))
    };

    await fetch(url, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    document.getElementById("resultadoBusca").innerHTML = `
      <div class="card centered">
        <p class="success-message"><strong>Presença confirmada 💛</strong></p>
        <p>Estamos muito felizes em ter você com a gente!</p>
      </div>
    `;
  }

  carregarDados();
</script>
