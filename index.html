<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Confirmation System</title>
    <script>
        // Function to dynamically generate form fields
        function generateForm() {
            const form = document.getElementById('guestForm');
            form.innerHTML = ''; // Clear existing fields
            const guestCount = document.getElementById('guestCount').value;
            for (let i = 0; i < guestCount; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = `Guest ${i + 1} Name`;
                input.name = `guest${i + 1}`;
                form.appendChild(input);
            }
        }

        // Function to normalize text input
        function normalizeText(text) {
            return text.trim().toLowerCase();
        }

        // Function to handle form submission and send data to Google Sheets
        async function handleFormSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);
            const normalizedData = Object.fromEntries(Object.entries(data).map(([key, value]) => [key, normalizeText(value)]));

            // Code to send `normalizedData` to Google Sheets goes here
            console.log(normalizedData);
            alert('Guest data has been prepared.');
        }
    </script>
</head>
<body>
    <h1>Enhanced Guest Confirmation System</h1>
    <label for="guestCount">Number of Guests:</label>
    <input type="number" id="guestCount" min="1" onchange="generateForm()">
    <form id="guestForm" onsubmit="handleFormSubmit(event)">
        <!-- Dynamic fields will be added here -->
    </form>
    <button type="submit" form="guestForm">Submit</button>
</body>
</html>
