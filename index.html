<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Marina e Victor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    /* 👉 NOVA FONTE */
    @font-face {
      font-family: 'SangBleu';
      src: url('SangBleuKingdom-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #f4eee6;
      --bg-2: #f8f4ef;
      --card: rgba(255, 255, 255, 0.78);
      --text: #54483f;
      --muted: #85786d;
      --primary: #9a3f2d;
      --primary-dark: #7f3123;
      --line: #dfd4c6;
      --shadow: 0 12px 32px rgba(80, 60, 45, 0.08);
      --radius: 18px;
      --font-body: Georgia, serif;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      text-align: center;
      background: linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-card {
      width: 100%;
      padding: 60px 20px;
      border-radius: 24px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
    }

    .hero-tag {
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* 🔥 AQUI ESTÁ A MUDANÇA */
    .hero h1 {
      font-family: 'SangBleu', serif;
      font-size: 100px;
      color: var(--primary);
      margin: 0;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .hero-divider {
      width: 80px;
      height: 1px;
      background: #d8cfc5;
      margin: 30px auto;
    }

    .hero-subtitle {
      font-size: 18px;
      line-height: 1.8;
      max-width: 700px;
      margin: auto;
    }

  </style>
</head>

<body>

<div class="container">

  <section class="hero">
    <div class="hero-card">
      <div class="hero-tag">15 de agosto de 2026</div>

      <!-- 👇 AQUI USA A NOVA FONTE -->
      <h1>Marina e Victor</h1>

      <div class="hero-divider"></div>

      <p class="hero-subtitle">
        É com muita alegria que convidamos vocês para o nosso casamento.
        Reserve a nossa data: <strong>15/08/2026</strong>.
        A presença de vocês é muito importante para nós.
      </p>
    </div>
  </section>

</div>

</body>
</html>
